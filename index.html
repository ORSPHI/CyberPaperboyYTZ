<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CyberPaperboy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#0a0a0a;--paper:#f5f0e8;--paper-dark:#ede7d5;--red:#c0392b;--gold:#b8860b;--green:#1a7a3a;--mid:#555;--light:#999;--border:#2a2a2a;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--paper);color:var(--ink);font-family:'Noto Serif SC','Playfair Display',serif;min-height:100vh;}
    #masthead{border-bottom:4px double var(--border);padding:16px 40px 10px;display:flex;align-items:flex-end;justify-content:space-between;background:var(--paper);}
    #masthead .date-line{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mid);letter-spacing:.05em;width:160px;}
    #masthead h1{font-family:'Playfair Display',serif;font-size:clamp(24px,5vw,52px);font-weight:900;letter-spacing:-.02em;line-height:1;text-align:center;flex:1;}
    #masthead h1 span{color:var(--red);}
    #masthead .tagline{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--light);text-align:right;width:160px;}
    #ticker-bar{background:var(--ink);color:var(--paper);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 0;overflow:hidden;white-space:nowrap;}
    #ticker-bar span{display:inline-block;animation:ticker 80s linear infinite;padding-left:100%;}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-100%)}}
    #market-strip{background:#111;border-bottom:2px solid var(--border);overflow-x:auto;overflow-y:hidden;white-space:nowrap;padding:0 4px;scrollbar-width:none;}
    #market-strip::-webkit-scrollbar{display:none;}
    .mkt{display:inline-flex;flex-direction:column;align-items:flex-start;padding:5px 10px;border-right:1px solid #333;cursor:default;min-width:82px;}
    .mkt:last-child{border-right:none;}
    .mkt-top{display:flex;align-items:center;gap:4px;}
    .mkt-zh{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#aaa;letter-spacing:.04em;}
    .mkt-state{font-size:7px;padding:1px 3px;border-radius:2px;font-family:'IBM Plex Mono',monospace;}
    .mkt-state.open{background:#1a7a3a;color:#fff;}.mkt-state.closed{background:#444;color:#aaa;}
    .mkt-price{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:#eee;margin-top:1px;}
    .mkt-chg{font-family:'IBM Plex Mono',monospace;font-size:9px;margin-top:1px;}
    .mkt-chg.up{color:#4caf50;}.mkt-chg.down{color:#ef5350;}.mkt-chg.flat{color:#aaa;}
    .mkt-err{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#666;padding:8px 14px;}
    .mkt-sep{display:inline-flex;align-items:center;padding:4px 6px;font-family:'IBM Plex Mono',monospace;font-size:8px;color:#c0392b;letter-spacing:.08em;text-transform:uppercase;border-right:1px solid #333;vertical-align:top;min-height:44px;writing-mode:horizontal-tb;}
    #app{max-width:1280px;margin:0 auto;padding:0 20px 80px;}
    #control-bar{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;}
    #fetch-btn{background:var(--ink);color:var(--paper);border:none;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;letter-spacing:.08em;padding:10px 28px;cursor:pointer;text-transform:uppercase;transition:background .15s,transform .1s;position:relative;overflow:hidden;}
    #fetch-btn:hover{background:var(--red);}#fetch-btn:active{transform:scale(.97);}
    #fetch-btn.loading{background:var(--gold);pointer-events:none;}
    #fetch-btn.loading::after{content:'';position:absolute;bottom:0;left:0;height:3px;background:var(--paper);animation:bar 55s ease-out forwards;}
    @keyframes bar{0%{width:0}80%{width:82%}100%{width:96%}}
    #status-text{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mid);flex:1;}
    #settings-toggle{background:none;border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 14px;cursor:pointer;color:var(--mid);transition:all .15s;}
    #settings-toggle:hover{background:var(--ink);color:var(--paper);}
    #model-toggle{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mid);}
    #model-toggle select{background:var(--paper-dark);border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 8px;cursor:pointer;color:var(--ink);}
    #failure-notice{display:none;background:#fff8e1;border-left:3px solid var(--gold);padding:8px 14px;margin-top:10px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#7a5c00;}
    #failure-notice.visible{display:block;}
    #settings-panel{display:none;background:var(--paper-dark);border:1px solid var(--border);border-top:none;padding:24px;}
    #settings-panel.visible{display:block;}
    #settings-panel h3{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;}
    .stabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border);}
    .stab{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:7px 18px;cursor:pointer;border:none;background:none;color:var(--mid);letter-spacing:.06em;text-transform:uppercase;border-bottom:3px solid transparent;margin-bottom:-2px;}
    .stab.active{color:var(--ink);border-bottom-color:var(--red);}
    .stab-panel{display:none;}.stab-panel.active{display:block;}
    .sg{margin-bottom:20px;}.sg label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mid);display:block;margin-bottom:6px;}
    .sg input[type=text],.sg input[type=password]{width:100%;background:var(--paper);border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:8px 10px;color:var(--ink);}
    .sg input:focus{outline:2px solid var(--ink);}
    #rss-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
    .rss-row{display:flex;gap:8px;align-items:center;}
    .rss-row input{background:var(--paper);border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 8px;color:var(--ink);}
    .rss-row .rl{width:145px;flex-shrink:0;}.rss-row .ru{flex:1;}
    .rss-row .del,.wl-del{background:none;border:1px solid var(--red);color:var(--red);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 8px;cursor:pointer;flex-shrink:0;}
    .rss-row .del:hover,.wl-del:hover{background:var(--red);color:var(--paper);}
    .btn-row{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap;}
    .abtn{background:var(--ink);color:var(--paper);border:none;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:8px 16px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;}
    .abtn:hover{background:var(--red);}
    #save-status{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);}
    #wl-countries{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;}
    .wl-ctab{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 12px;cursor:pointer;border:1px solid var(--border);background:var(--paper);color:var(--mid);}
    .wl-ctab.active{background:var(--ink);color:var(--paper);}
    .wl-country-panel{display:none;}.wl-country-panel.active{display:block;}
    .wl-country-panel label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mid);display:block;margin-bottom:6px;}
    .wl-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;max-height:260px;overflow-y:auto;}
    .wl-row{display:flex;gap:8px;align-items:center;}
    .wl-row input{flex:1;background:var(--paper);border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 8px;color:var(--ink);}
    .wl-note{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--light);margin-top:6px;}
    #brief-area{display:none;margin-top:20px;}#brief-area.visible{display:block;}
    #watchlist-alert{display:none;background:#fff3cd;border:1px solid #d4a017;border-left:4px solid #d4a017;padding:14px 18px;margin-bottom:4px;}
    #watchlist-alert.visible{display:block;}
    #watchlist-alert .wa-head{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#7a5c00;margin-bottom:6px;}
    #watchlist-alert .wa-body{font-size:13px;line-height:1.7;color:#5c4200;}
    .sec-head{border-top:3px solid var(--ink);border-bottom:1px solid var(--ink);padding:6px 0;margin:24px 0 0;display:flex;align-items:baseline;gap:12px;}
    .sec-head h2{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--red);white-space:nowrap;}
    .sec-head .rule{flex:1;height:1px;background:var(--light);}
    .sec-head .cnt{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--light);}
    .ngrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));}
    .ni{padding:14px 16px;border-right:1px solid #d0c9b8;border-bottom:1px solid #d0c9b8;}
    .ni h3{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;line-height:1.3;margin-bottom:6px;}
    .ni p{font-size:13px;line-height:1.6;color:var(--mid);}
    .ni .en-orig{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--light);margin-top:6px;padding:4px 8px;background:rgba(0,0,0,.04);border-left:2px solid var(--light);line-height:1.5;}
    .ni .src{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--light);text-transform:uppercase;letter-spacing:.08em;margin-top:8px;}
    .lead{grid-column:1/-1;padding:18px 0;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 2px 2fr;gap:24px;align-items:start;}
    .lead-hed{font-family:'Playfair Display',serif;font-size:clamp(18px,3vw,30px);font-weight:900;line-height:1.15;}
    .lead-rule{background:var(--ink);align-self:stretch;}
    .lead-dek{font-size:14px;line-height:1.8;color:var(--mid);}
    .anote{padding:16px 20px;background:var(--paper-dark);border-left:4px solid var(--red);font-size:14px;line-height:1.8;color:var(--mid);margin-top:4px;}
    #chat-area{display:none;margin-top:28px;border-top:4px double var(--border);padding-top:18px;}
    #chat-area.visible{display:block;}
    #chat-area>h2{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-bottom:14px;}
    #messages{display:flex;flex-direction:column;gap:12px;max-height:520px;overflow-y:auto;padding-right:6px;margin-bottom:14px;}
    #messages::-webkit-scrollbar{width:4px;}#messages::-webkit-scrollbar-thumb{background:var(--light);}
    .msg{display:flex;gap:12px;animation:fadeUp .25s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    .msg-role{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;min-width:44px;padding-top:2px;color:var(--light);flex-shrink:0;}
    .msg.assistant .msg-role{color:var(--red);}
    .msg-body{font-size:14px;line-height:1.75;flex:1;}
    .msg.assistant .msg-body{background:var(--paper-dark);padding:12px 16px;border-left:3px solid var(--red);}
    #chat-input-row{display:flex;gap:10px;}
    #chat-input{flex:1;background:var(--paper-dark);border:1px solid var(--border);font-family:'Noto Serif SC',serif;font-size:14px;padding:10px 14px;resize:none;height:52px;color:var(--ink);}
    #chat-input:focus{outline:2px solid var(--ink);}
    #send-btn{background:var(--ink);color:var(--paper);border:none;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em;padding:0 20px;cursor:pointer;text-transform:uppercase;transition:background .15s;flex-shrink:0;}
    #send-btn:hover{background:var(--red);}#send-btn:disabled{background:var(--light);pointer-events:none;}
    footer{border-top:1px solid var(--border);padding:12px 40px;display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--light);}
    ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--paper-dark);}::-webkit-scrollbar-thumb{background:var(--mid);}
  </style>
</head>
<body>
<header id="masthead">
  <div class="date-line" id="date-display"></div>
  <h1>Cyber<span>Paperboy</span></h1>
  <div class="tagline">Global risk intelligence<br>daily dispatch</div>
</header>
<div id="ticker-bar"><span id="ticker-content">CyberPaperboy · 全球风险情报 · 出海企业战略风控 · 15大股指 · 10种商品 · 5大汇率 · VIX恐慌指数</span></div>
<div id="market-strip"><span id="market-loading" style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#555;padding:8px 16px;display:inline-block;">正在加载市场数据…</span></div>
<div id="app">
  <div id="control-bar">
    <button id="fetch-btn" onclick="fetchBrief()">📰 我要买报</button>
    <span id="status-text">就绪 · 点击获取今日情报</span>
    <button id="settings-toggle" onclick="toggleSettings()">⚙ 设置</button>
    <div id="model-toggle">模型：<select id="model-select"><option value="deepseek-chat">DeepSeek V3（快速）</option><option value="deepseek-reasoner">DeepSeek R1（深度推理）</option></select></div>
  </div>
  <div id="failure-notice"></div>
  <div id="settings-panel">
    <h3>设置</h3>
    <div class="sg"><label>DEEPSEEK API KEY</label><input type="password" id="api-key-input" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off"/></div>
    <div class="stabs"><button class="stab active" onclick="switchTab('rss')">📡 RSS 信源</button><button class="stab" onclick="switchTab('watchlist')">🏢 企业观察名单</button></div>
    <div id="tab-rss" class="stab-panel active"><div class="sg" style="margin-bottom:0"><label>信源列表</label><div id="rss-list"></div><div class="btn-row"><button class="abtn" onclick="addRssRow()">+ 添加信源</button><button class="abtn" onclick="saveSettings()">保存并关闭</button><span id="save-status"></span></div></div></div>
    <div id="tab-watchlist" class="stab-panel"><div class="sg" style="margin-bottom:0"><label>企业观察名单（每国20家）</label><div id="wl-countries"></div><div id="wl-panels"></div><p class="wl-note">* 朝鲜无可追踪的公开企业，通过新闻信源间接追踪。</p><div class="btn-row"><button class="abtn" onclick="addWlRow()">+ 添加企业</button><button class="abtn" onclick="saveSettings()">保存并关闭</button><span id="save-status2"></span></div></div></div>
  </div>
  <div id="brief-area"><div id="watchlist-alert"><div class="wa-head">🔔 企业名单调整建议</div><div class="wa-body" id="wa-body"></div></div><div id="brief-content"></div></div>
  <div id="chat-area">
    <h2>▸ 深度对话 · 基于今日简报</h2><div id="messages"></div>
    <div id="chat-input-row"><textarea id="chat-input" placeholder="例如：如果我是东南亚制造业出海团队，今天最该关注什么？（Enter 发送）" onkeydown="handleKey(event)"></textarea><button id="send-btn" onclick="sendChat()">发送</button></div>
  </div>
</div>
<footer><span>CyberPaperboy v5</span><span>DeepSeek API · 多源 RSS · Stooq / Yahoo Finance</span></footer>

<script>
const DEFAULT_FEEDS = [
  // ── 核心国际媒体（稳定）──
  { label: 'BBC World News',       url: 'https://feeds.bbci.co.uk/news/world/rss.xml' },
  { label: 'Al Jazeera',           url: 'https://www.aljazeera.com/xml/rss/all.xml' },
  { label: 'The Guardian World',   url: 'https://www.theguardian.com/world/rss' },
  { label: 'WSJ World',            url: 'https://feeds.a.dj.com/rss/RSSWorldNews.xml' },
  { label: 'WSJ Markets',          url: 'https://feeds.a.dj.com/rss/RSSMarketsMain.xml' },
  { label: 'Financial Times',      url: 'https://www.ft.com/rss/home' },
  { label: 'Nikkei Asia',          url: 'https://asia.nikkei.com/rss/feed/nar' },
  { label: 'SCMP',                 url: 'https://www.scmp.com/rss/91/feed' },
  // ── 科技（稳定）──
  { label: 'The Verge',            url: 'https://www.theverge.com/rss/index.xml' },
  { label: 'Ars Technica',         url: 'https://feeds.arstechnica.com/arstechnica/index' },
  { label: 'Hacker News',          url: 'https://hnrss.org/frontpage' },
  { label: '36氪',                 url: 'https://36kr.com/feed' },
  // ── 政府（稳定）──
  { label: 'UK Government',        url: 'https://www.gov.uk/search/news-and-communications.atom' },
  { label: 'TASS English',         url: 'https://tass.com/rss/v2.xml' },
  // ── 国际组织（已验证可用）──
  { label: 'UN News',              url: 'https://news.un.org/feed/subscribe/en/news/all/rss.xml' },
  { label: 'European Parliament',  url: 'https://www.europarl.europa.eu/rss/doc/top-stories/en.xml' },
  { label: 'ECB Press',            url: 'https://www.ecb.europa.eu/rss/press.html' },
  { label: 'Japan Times',          url: 'https://www.japantimes.co.jp/feed/' },
  // ── 企业情报（已验证可用）──
  { label: 'TechCrunch',           url: 'https://techcrunch.com/feed/' },
  { label: 'GlobeNewsWire',        url: 'https://www.globenewswire.com/RssFeed/subjectcode/01-ACQ/feedTitle/GlobeNewsWire' },
  { label: 'PR Newswire',          url: 'https://www.prnewswire.com/rss/news-releases-list.rss' },
  // ── 深度分析与政策（替换失败源，选用分发型/WordPress站点）──
  { label: 'MarketWatch',          url: 'https://feeds.marketwatch.com/marketwatch/topstories/' },
  { label: 'The Diplomat',         url: 'https://thediplomat.com/feed/' },
  { label: 'Foreign Policy',       url: 'https://foreignpolicy.com/feed/' },
  { label: 'Politico',             url: 'https://www.politico.com/rss/politicopicks.xml' },
  { label: 'Asia Times',           url: 'https://asiatimes.com/feed/' },
];

const DEFAULT_WATCHLIST = {
  '中国': ['宁德时代','比亚迪','华为','阿里巴巴','腾讯','字节跳动','中国石油','中国工商银行','中国移动','中芯国际','大疆','小米','美团','京东','百度','中远海运','国家电网','中国中车','中国建筑','恒生电子'],
  '美国': ['Apple','Microsoft','Nvidia','Alphabet','Amazon','Meta','Tesla','JPMorgan','ExxonMobil','Johnson & Johnson','Walmart','Lockheed Martin','Boeing','Goldman Sachs','Pfizer','UnitedHealth','Berkshire Hathaway','Chevron','Raytheon','OpenAI'],
  '英国': ['Shell','BP','HSBC','AstraZeneca','Unilever','GSK','Rio Tinto','BAE Systems','Rolls-Royce','Barclays','Lloyds','Vodafone','BT Group','National Grid','Diageo','Reckitt','Arm Holdings','London Stock Exchange','Compass Group','Halma'],
  '法国': ['TotalEnergies','LVMH','L\'Oréal','Sanofi','BNP Paribas','Airbus','Hermès','Schneider Electric','Air Liquide','Safran','Danone','Société Générale','Engie','Renault','Stellantis','Capgemini','AXA','Thales','Michelin','Carrefour'],
  '德国': ['Volkswagen','Siemens','BASF','Allianz','BMW','Mercedes-Benz','SAP','Deutsche Telekom','Bayer','Bosch','Deutsche Bank','E.ON','RWE','Infineon','Henkel','Daimler Truck','Fresenius','Merck KGaA','Continental','Adidas'],
  '日本': ['丰田','索尼','软银','三菱UFJ','基恩士','任天堂','本田','日立','富士通','NTT','发那科','信越化学','电装','武田制药','三菱商事','住友商事','瑞萨电子','村田制作所','松下','斯巴鲁'],
  '韩国': ['三星电子','SK海力士','现代汽车','浦项钢铁','LG能源','Kakao','Naver','三星生物','LG化学','起亚','KB金融','新韩金融','乐天','HD现代','KT','韩华','斗山能源','CJ集团','Celltrion','现代重工'],
  '俄罗斯': ['Gazprom','Rosneft','Sberbank','Lukoil','Norilsk Nickel','Rosatom','Rostec','RusHydro','Severstal','VTB','NLMK','Rusal','PhosAgro','Surgutneftegas','Alrosa','Aeroflot','VK','Yandex','Inter RAO','Transneft'],
  '台湾': ['台积电','鸿海','联发科','日月光','台达电','大立光','中华电信','国泰金控','富邦金控','联电','瑞昱','广达','纬创','仁宝','玉山金控','远传','台塑','南亚塑胶','中信金控','台湾水泥'],
};

let briefContext='',chatHistory=[],settings={},activeWlCountry=Object.keys(DEFAULT_WATCHLIST)[0],activeSettingsTab='rss';

window.onload=()=>{document.getElementById('date-display').textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});loadSettings();if(!settings.apiKey){document.getElementById('settings-panel').classList.add('visible');document.getElementById('status-text').textContent='⚠ 请先填入 API Key 并保存';}loadMarkets();};
function loadSettings(){try{const s=localStorage.getItem('cpb_settings_v5');settings=s?JSON.parse(s):{apiKey:'',feeds:DEFAULT_FEEDS,watchlist:DEFAULT_WATCHLIST};if(!settings.feeds)settings.feeds=DEFAULT_FEEDS;if(!settings.watchlist)settings.watchlist=DEFAULT_WATCHLIST;}catch{settings={apiKey:'',feeds:DEFAULT_FEEDS,watchlist:DEFAULT_WATCHLIST};}document.getElementById('api-key-input').value=settings.apiKey||'';renderRssList();renderWatchlist();}
function saveSettings(){settings.apiKey=document.getElementById('api-key-input').value.trim();settings.feeds=collectRssRows();settings.watchlist=collectWatchlist();localStorage.setItem('cpb_settings_v5',JSON.stringify(settings));['save-status','save-status2'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent='✓ 已保存';setTimeout(()=>el.textContent='',2000);}});document.getElementById('settings-panel').classList.remove('visible');if(settings.apiKey)document.getElementById('status-text').textContent='就绪 · 点击获取今日情报';}
function toggleSettings(){document.getElementById('settings-panel').classList.toggle('visible');}
function switchTab(n){activeSettingsTab=n;document.querySelectorAll('.stab').forEach((t,i)=>t.classList.toggle('active',['rss','watchlist'][i]===n));document.querySelectorAll('.stab-panel').forEach(p=>p.classList.remove('active'));document.getElementById(`tab-${n}`).classList.add('active');}
function renderRssList(){const l=document.getElementById('rss-list');l.innerHTML='';(settings.feeds||DEFAULT_FEEDS).forEach(f=>l.appendChild(makeRssRow(f.label,f.url)));}
function makeRssRow(l,u){const r=document.createElement('div');r.className='rss-row';r.innerHTML=`<input class="rl" type="text" value="${esc(l)}" placeholder="名称"><input class="ru" type="text" value="${esc(u)}" placeholder="RSS URL"><button class="del" onclick="this.closest('.rss-row').remove()">✕</button>`;return r;}
function addRssRow(){document.getElementById('rss-list').appendChild(makeRssRow('',''));}
function collectRssRows(){return Array.from(document.querySelectorAll('.rss-row')).map(r=>({label:r.querySelector('.rl').value.trim(),url:r.querySelector('.ru').value.trim()})).filter(f=>f.url);}
function renderWatchlist(){const cs=Object.keys(settings.watchlist||DEFAULT_WATCHLIST),tabs=document.getElementById('wl-countries'),panels=document.getElementById('wl-panels');tabs.innerHTML='';panels.innerHTML='';cs.forEach((c,i)=>{const t=document.createElement('button');t.className='wl-ctab'+(i===0?' active':'');t.textContent=c;t.onclick=()=>switchWlCountry(c);tabs.appendChild(t);const p=document.createElement('div');p.className='wl-country-panel'+(i===0?' active':'');p.id=`wlp-${c}`;p.innerHTML=`<label>${c}</label><div class="wl-list" id="wll-${c}"></div>`;panels.appendChild(p);const l=document.getElementById(`wll-${c}`);(settings.watchlist[c]||[]).forEach(n=>l.appendChild(makeWlRow(n)));});activeWlCountry=cs[0];}
function makeWlRow(n){const r=document.createElement('div');r.className='wl-row';r.innerHTML=`<input type="text" value="${esc(n)}" placeholder="企业名称"><button class="wl-del" onclick="this.closest('.wl-row').remove()">✕</button>`;return r;}
function addWlRow(){const l=document.getElementById(`wll-${activeWlCountry}`);if(l)l.appendChild(makeWlRow(''));}
function switchWlCountry(c){activeWlCountry=c;document.querySelectorAll('.wl-ctab').forEach(t=>t.classList.toggle('active',t.textContent===c));document.querySelectorAll('.wl-country-panel').forEach(p=>p.classList.toggle('active',p.id===`wlp-${c}`));}
function collectWatchlist(){const w={};Object.keys(settings.watchlist||DEFAULT_WATCHLIST).forEach(c=>{const rs=document.querySelectorAll(`#wll-${c} .wl-row input`);w[c]=Array.from(rs).map(r=>r.value.trim()).filter(Boolean);});return w;}

// ═══ MARKET STRIP ═══
async function loadMarkets(){try{const r=await fetch('/api/stocks');const d=await r.json();renderMarketStrip(d);}catch{document.getElementById('market-strip').innerHTML='<span class="mkt-err">市场数据暂时不可用</span>';}}
function renderMarketStrip({markets,error}){
  const strip=document.getElementById('market-strip');
  if(!markets||!markets.length){strip.innerHTML=`<span class="mkt-err">市场数据不可用${error?'：'+error:''}</span>`;return;}
  const catLabel={idx:'股指',cmd:'商品',fx:'汇率',risk:'风险'};
  const failed=markets.filter(m=>m.error),valid=markets.filter(m=>!m.error);
  let html='',lastCat='';
  for(const m of valid){
    if(m.cat&&m.cat!==lastCat){if(lastCat)html+=`<span class="mkt-sep">${catLabel[m.cat]||''}</span>`;lastCat=m.cat;}
    const up=m.changePct>=0,flat=Math.abs(m.changePct)<0.01;
    const cls=flat?'flat':up?'up':'down',arrow=flat?'─':up?'▲':'▼';
    const st=(m.cat==='idx')?(m.state==='REGULAR'?'<span class="mkt-state open">开盘</span>':'<span class="mkt-state closed">收盘</span>'):'';
    const pr=Number(m.price).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
    const pct=(up&&!flat?'+':'')+Number(m.changePct).toFixed(2)+'%';
    html+=`<div class="mkt"><div class="mkt-top"><span class="mkt-zh">${m.zh}</span>${st}</div><span class="mkt-price">${pr}</span><span class="mkt-chg ${cls}">${arrow} ${pct}</span></div>`;
  }
  if(failed.length>0&&failed.length<markets.length)html+=`<span class="mkt-err">部分不可用: ${failed.map(m=>m.zh||m.symbol).join(', ')}</span>`;
  strip.innerHTML=html;
}

// ═══ FETCH BRIEF ═══
async function fetchBrief(){
  if(!settings.apiKey){document.getElementById('settings-panel').classList.add('visible');document.getElementById('status-text').textContent='⚠ 请先填入 API Key';return;}
  const btn=document.getElementById('fetch-btn'),status=document.getElementById('status-text');
  btn.classList.add('loading');btn.textContent='⏳ 报童送报中…';status.textContent='正在抓取 RSS 信源…';
  const feeds=(settings.feeds?.length)?settings.feeds:DEFAULT_FEEDS;
  let allItems=[],rssFailures=[];
  try{const r=await fetch('/api/rss',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({feeds})});const d=await r.json();allItems=d.items||[];rssFailures=d.failures||[];}
  catch(e){btn.classList.remove('loading');btn.textContent='📰 我要买报';status.textContent=`⚠ RSS 抓取失败：${e.message}`;return;}
  let stockSummary='（无市场数据）';
  try{const sr=await fetch('/api/stocks');const sd=await sr.json();stockSummary=formatStockSummary(sd.markets||[]);renderMarketStrip(sd);}catch{}
  showFailureNotice(rssFailures);
  if(!allItems.length){btn.classList.remove('loading');btn.textContent='📰 我要买报';status.textContent='⚠ 所有信源均失败';return;}
  status.textContent=`已获取 ${allItems.length} 条，正在生成情报…`;
  const wl=settings.watchlist||DEFAULT_WATCHLIST;
  const wlText=Object.entries(wl).map(([c,cos])=>`${c}：${cos.join('、')}`).join('\n');
  const items=allItems.slice(0,35);
  const newsText=items.map(i=>`[${i.source}] ${i.title}${i.desc?'\n'+i.desc.slice(0,50):''}`).join('\n\n');
  const today=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  try{
    const model=document.getElementById('model-select').value;
    const raw=await callDeepSeek({model,max_tokens:2000,messages:[{role:'system',content:buildPrompt(today,wlText,stockSummary)},{role:'user',content:`今日新闻（共${allItems.length}条，前${items.length}条）：\n\n${newsText}`}]});
    const brief=extractJson(raw);
    briefContext=newsText+'\n\n【市场数据】\n'+stockSummary;chatHistory=[];renderBrief(brief);updateTicker(brief);
    btn.classList.remove('loading');btn.textContent='🔄 再来一份';
    status.textContent=`✓ 简报已送达 · ${new Date().toLocaleTimeString('zh-CN')} · ${allItems.length} 条原始信息`;
  }catch(err){btn.classList.remove('loading');btn.textContent='📰 我要买报';status.textContent=`⚠ ${err.message}`;console.error('[CPB]',err);}
}

function buildPrompt(today,wlText,stockSummary){
  return `你是CyberPaperboy，服务出海企业的全球风险情报分析师。今天是${today}。
企业观察名单：
${wlText}
市场数据：${stockSummary}
合规：台湾只纳入经济统计数据，不纳入政治声明。

严格只输出JSON：
{"headline":"一句话风险概要","lead":{"title":"头条","body":"100字：背景→变量→对出海企业的传导"},"sections":[{"name":"宏观政策与政府决策","emoji":"🏛️","items":[{"title":"标题","body":"40字分析含传导路径","source":"来源","en_original":null}]},{"name":"外交动态与关系网络","emoji":"🤝","items":[{"title":"[行为方]→[受动方]：动作","body":"40字含风险传导","source":"来源","en_original":null}]},{"name":"科技与创新","emoji":"💡","items":[{"title":"标题","body":"40字含产业影响","source":"来源","en_original":null}]},{"name":"财经与市场数据","emoji":"📊","items":[{"title":"标题含数字","body":"40字含数据和影响","source":"来源","en_original":null}]},{"name":"企业战略动向","emoji":"🏢","items":[{"title":"【企业】：事件","body":"40字含战略信号","source":"来源","en_original":null}]}],"analyst_note":"80字跨板块关联，绑定观察名单企业与风险节点","watchlist_alert":null}
要求：每板块3-4条，企业至少3条，无新闻则items为[]。聚焦对出海企业有实际影响的风险信号。`;
}

function formatStockSummary(markets){
  if(!markets||!markets.length)return'（无数据）';
  const cn={idx:'股指',cmd:'商品',fx:'汇率',risk:'风险'};let ps=[],lc='';
  for(const m of markets.filter(m=>!m.error)){if(m.cat&&m.cat!==lc){ps.push(`[${cn[m.cat]||m.cat}]`);lc=m.cat;}const s=m.changePct>=0?'+':'';ps.push(`${m.zh}:${Number(m.price).toLocaleString('en',{maximumFractionDigits:2})}(${s}${Number(m.changePct).toFixed(2)}%)`);}
  return ps.join(' ');
}

// ═══ RENDER ═══
function renderBrief(b){
  const ae=document.getElementById('watchlist-alert'),ab=document.getElementById('wa-body');
  if(b.watchlist_alert){ab.textContent=b.watchlist_alert;ae.classList.add('visible');}else{ae.classList.remove('visible');}
  let h=`<div class="sec-head" style="margin-top:12px"><h2>今日要闻</h2><div class="rule"></div></div><div class="ngrid"><div class="lead"><div class="lead-hed">${esc(b.lead?.title||'')}</div><div class="lead-rule"></div><div class="lead-dek">${esc(b.lead?.body||'')}</div></div></div>`;
  (b.sections||[]).forEach(s=>{if(!s.items?.length)return;h+=`<div class="sec-head"><h2>${s.emoji||''} ${esc(s.name)}</h2><div class="rule"></div><span class="cnt">${s.items.length} 条</span></div><div class="ngrid">${s.items.map(i=>{const eo=i.en_original?`<div class="en-orig">${esc(i.en_original)}</div>`:'';return`<div class="ni"><h3>${esc(i.title)}</h3><p>${esc(i.body)}</p>${eo}<div class="src">${esc(i.source||'')}</div></div>`;}).join('')}</div>`;});
  if(b.analyst_note)h+=`<div class="sec-head"><h2>✍ 分析师按语</h2><div class="rule"></div></div><div class="anote">${esc(b.analyst_note)}</div>`;
  document.getElementById('brief-content').innerHTML=h;document.getElementById('brief-area').classList.add('visible');document.getElementById('chat-area').classList.add('visible');document.getElementById('messages').innerHTML='';
  addMsg('assistant',`今日简报已送达。要点：${b.headline||''}\n\n可深度追问任何议题。`);
}
function updateTicker(b){document.getElementById('ticker-content').textContent=`CyberPaperboy · ${b.headline||''} · `+(b.sections||[]).flatMap(s=>(s.items||[]).map(i=>i.title)).join(' · ');}
function showFailureNotice(f){const el=document.getElementById('failure-notice');if(!f.length){el.classList.remove('visible');return;}el.innerHTML=`⚠ 以下信源抓取失败（已从其他信源补充）：${f.map(x=>`<strong>${esc(x)}</strong>`).join('、')}`;el.classList.add('visible');}

// ═══ API ═══
async function callDeepSeek({model,max_tokens,messages}){
  const res=await fetch('/api/deepseek',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model,max_tokens,messages,apiKey:settings.apiKey})});
  if(!res.ok&&res.headers.get('content-type')?.includes('application/json')){const d=await res.json();throw new Error(d.error?.message||'DeepSeek 错误');}
  const reader=res.body.getReader(),dec=new TextDecoder();let full='',buf='';
  while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';for(const line of lines){if(!line.startsWith('data: '))continue;const d=line.slice(6).trim();if(d==='[DONE]')continue;try{const c=JSON.parse(d).choices?.[0]?.delta?.content;if(c)full+=c;}catch{}}}
  if(!full)throw new Error('AI 未返回内容');return full;
}
function extractJson(raw){
  let c=raw.trim().replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/i,'').trim();
  const s=c.indexOf('{'),e=c.lastIndexOf('}');if(s!==-1&&e!==-1)c=c.slice(s,e+1);
  c=c.replace(/,\s*([}\]])/g,'$1');c=c.replace(/(["\d\]}\w])\s*\n\s*"/g,'$1,"');c=c.replace(/[\x00-\x1F\x7F]/g,m=>m==='\n'||m==='\r'||m==='\t'?m:'');
  try{return JSON.parse(c);}catch(err){try{c=c.replace(/:\s*'([^']*)'/g,':"$1"');c=c.replace(/,\s*([}\]])/g,'$1');return JSON.parse(c);}catch{throw new Error(`AI 格式异常，请重试（${err.message}）`);}}
}

// ═══ CHAT ═══
async function sendChat(){
  const input=document.getElementById('chat-input'),text=input.value.trim();if(!text||!settings.apiKey)return;
  addMsg('user',text);input.value='';chatHistory.push({role:'user',content:text});
  const btn=document.getElementById('send-btn');btn.disabled=true;btn.textContent='…';
  try{const reply=await callDeepSeek({model:document.getElementById('model-select').value,max_tokens:2000,messages:[{role:'system',content:`你是CyberPaperboy深度分析助手，服务出海企业风控。今日数据：\n${briefContext}\n\n从出海企业视角深度分析，给出风险传导和应对建议。`},...chatHistory]});chatHistory.push({role:'assistant',content:reply});addMsg('assistant',reply);}catch(err){addMsg('assistant',`⚠ ${err.message}`);}
  btn.disabled=false;btn.textContent='发送';
}
function addMsg(role,text){const msgs=document.getElementById('messages');const d=document.createElement('div');d.className=`msg ${role}`;d.innerHTML=`<div class="msg-role">${role==='user'?'YOU':'CPB'}</div><div class="msg-body">${esc(text).replace(/\n/g,'<br>')}</div>`;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
