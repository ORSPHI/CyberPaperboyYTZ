<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberPaperboyYTZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0a0a0a;
      --paper: #f5f0e8;
      --paper-dark: #ede7d5;
      --red: #c0392b;
      --gold: #b8860b;
      --mid: #555;
      --light: #999;
      --border: #2a2a2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--paper); color: var(--ink); font-family: 'Noto Serif SC','Playfair Display',serif; min-height: 100vh; }

    /* MASTHEAD */
    #masthead { border-bottom: 4px double var(--border); padding: 18px 40px 12px; display: flex; align-items: flex-end; justify-content: space-between; background: var(--paper); }
    #masthead .date-line { font-family: 'IBM Plex Mono',monospace; font-size: 11px; color: var(--mid); letter-spacing: .05em; width: 160px; }
    #masthead h1 { font-family: 'Playfair Display',serif; font-size: clamp(28px,5vw,56px); font-weight: 900; letter-spacing: -.02em; line-height: 1; text-align: center; flex: 1; }
    #masthead h1 span { color: var(--red); }
    #masthead .tagline { font-family: 'IBM Plex Mono',monospace; font-size: 10px; color: var(--light); text-align: right; width: 160px; }

    /* TICKER */
    #ticker-bar { background: var(--ink); color: var(--paper); font-family: 'IBM Plex Mono',monospace; font-size: 11px; padding: 5px 0; overflow: hidden; white-space: nowrap; }
    #ticker-bar span { display: inline-block; animation: ticker 60s linear infinite; padding-left: 100%; }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-100%); } }

    /* LAYOUT */
    #app { max-width: 1200px; margin: 0 auto; padding: 0 20px 80px; }

    /* CONTROL BAR */
    #control-bar { display: flex; align-items: center; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    #fetch-btn { background: var(--ink); color: var(--paper); border: none; font-family: 'IBM Plex Mono',monospace; font-size: 13px; font-weight: 500; letter-spacing: .08em; padding: 10px 28px; cursor: pointer; text-transform: uppercase; transition: background .15s,transform .1s; position: relative; overflow: hidden; }
    #fetch-btn:hover { background: var(--red); }
    #fetch-btn:active { transform: scale(.97); }
    #fetch-btn.loading { background: var(--gold); pointer-events: none; }
    #fetch-btn.loading::after { content: ''; position: absolute; bottom: 0; left: 0; height: 3px; background: var(--paper); animation: bar 20s ease-out forwards; }
    @keyframes bar { 0%{width:0} 80%{width:80%} 100%{width:95%} }
    #status-text { font-family: 'IBM Plex Mono',monospace; font-size: 11px; color: var(--mid); }
    #settings-toggle { background: none; border: 1px solid var(--border); font-family: 'IBM Plex Mono',monospace; font-size: 11px; padding: 6px 14px; cursor: pointer; color: var(--mid); transition: all .15s; }
    #settings-toggle:hover { background: var(--ink); color: var(--paper); }
    #model-toggle { margin-left: auto; display: flex; align-items: center; gap: 8px; font-family: 'IBM Plex Mono',monospace; font-size: 11px; color: var(--mid); }
    #model-toggle select { background: var(--paper-dark); border: 1px solid var(--border); font-family: 'IBM Plex Mono',monospace; font-size: 11px; padding: 4px 8px; cursor: pointer; color: var(--ink); }

    /* SETTINGS PANEL */
    #settings-panel { display: none; background: var(--paper-dark); border: 1px solid var(--border); border-top: none; padding: 24px; }
    #settings-panel.visible { display: block; }
    #settings-panel h3 { font-family: 'IBM Plex Mono',monospace; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 16px; }
    .sg { margin-bottom: 20px; }
    .sg label { font-family: 'IBM Plex Mono',monospace; font-size: 11px; color: var(--mid); display: block; margin-bottom: 6px; }
    .sg input[type=text],.sg input[type=password] { width: 100%; background: var(--paper); border: 1px solid var(--border); font-family: 'IBM Plex Mono',monospace; font-size: 12px; padding: 8px 10px; color: var(--ink); }
    .sg input:focus { outline: 2px solid var(--ink); }
    #rss-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .rss-row { display: flex; gap: 8px; align-items: center; }
    .rss-row input { background: var(--paper); border: 1px solid var(--border); font-family: 'IBM Plex Mono',monospace; font-size: 11px; padding: 6px 8px; color: var(--ink); }
    .rss-row .rl { width: 150px; flex-shrink: 0; }
    .rss-row .ru { flex: 1; }
    .rss-row .del { background: none; border: 1px solid var(--red); color: var(--red); font-family: 'IBM Plex Mono',monospace; font-size: 11px; padding: 4px 8px; cursor: pointer; flex-shrink: 0; }
    .rss-row .del:hover { background: var(--red); color: var(--paper); }
    .btn-row { display: flex; gap: 10px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
    .abtn { background: var(--ink); color: var(--paper); border: none; font-family: 'IBM Plex Mono',monospace; font-size: 11px; padding: 8px 16px; cursor: pointer; text-transform: uppercase; letter-spacing: .06em; }
    .abtn:hover { background: var(--red); }
    #save-status { font-family: 'IBM Plex Mono',monospace; font-size: 11px; color: var(--gold); }

    /* BRIEF */
    #brief-area { display: none; margin-top: 24px; }
    #brief-area.visible { display: block; }
    .sec-head { border-top: 3px solid var(--ink); border-bottom: 1px solid var(--ink); padding: 6px 0; margin: 28px 0 0; display: flex; align-items: baseline; gap: 12px; }
    .sec-head h2 { font-family: 'IBM Plex Mono',monospace; font-size: 11px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--red); white-space: nowrap; }
    .sec-head .rule { flex: 1; height: 1px; background: var(--light); }
    .sec-head .cnt { font-family: 'IBM Plex Mono',monospace; font-size: 10px; color: var(--light); }

    /* FIX-7: removed nth-child(3n) border hack — columns are dynamic */
    .ngrid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); }
    .ni { padding: 14px 16px; border-right: 1px solid #d0c9b8; border-bottom: 1px solid #d0c9b8; }
    .ni h3 { font-family: 'Playfair Display',serif; font-size: 15px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
    .ni p { font-size: 13px; line-height: 1.6; color: var(--mid); }
    .ni .src { font-family: 'IBM Plex Mono',monospace; font-size: 9px; color: var(--light); text-transform: uppercase; letter-spacing: .08em; margin-top: 8px; }

    .lead { grid-column: 1/-1; padding: 20px 0; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr 2px 2fr; gap: 24px; align-items: start; }
    .lead-hed { font-family: 'Playfair Display',serif; font-size: clamp(20px,3vw,32px); font-weight: 900; line-height: 1.15; }
    .lead-rule { background: var(--ink); align-self: stretch; }
    .lead-dek { font-size: 14px; line-height: 1.8; color: var(--mid); }
    .anote { padding: 16px 20px; background: var(--paper-dark); border-left: 4px solid var(--red); font-size: 14px; line-height: 1.8; color: var(--mid); margin-top: 4px; }

    /* CHAT */
    #chat-area { display: none; margin-top: 32px; border-top: 4px double var(--border); padding-top: 20px; }
    #chat-area.visible { display: block; }
    #chat-area > h2 { font-family: 'IBM Plex Mono',monospace; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--red); margin-bottom: 16px; }
    #messages { display: flex; flex-direction: column; gap: 14px; max-height: 500px; overflow-y: auto; padding-right: 6px; margin-bottom: 16px; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--light); }
    .msg { display: flex; gap: 12px; animation: fadeUp .25s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    .msg-role { font-family: 'IBM Plex Mono',monospace; font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; min-width: 44px; padding-top: 2px; color: var(--light); flex-shrink: 0; }
    .msg.assistant .msg-role { color: var(--red); }
    .msg-body { font-size: 14px; line-height: 1.75; flex: 1; }
    .msg.assistant .msg-body { background: var(--paper-dark); padding: 12px 16px; border-left: 3px solid var(--red); }
    #chat-input-row { display: flex; gap: 10px; }
    #chat-input { flex: 1; background: var(--paper-dark); border: 1px solid var(--border); font-family: 'Noto Serif SC',serif; font-size: 14px; padding: 10px 14px; resize: none; height: 52px; color: var(--ink); }
    #chat-input:focus { outline: 2px solid var(--ink); }
    #send-btn { background: var(--ink); color: var(--paper); border: none; font-family: 'IBM Plex Mono',monospace; font-size: 12px; letter-spacing: .08em; padding: 0 20px; cursor: pointer; text-transform: uppercase; transition: background .15s; flex-shrink: 0; }
    #send-btn:hover { background: var(--red); }
    #send-btn:disabled { background: var(--light); pointer-events: none; }

    footer { border-top: 1px solid var(--border); padding: 12px 40px; display: flex; justify-content: space-between; font-family: 'IBM Plex Mono',monospace; font-size: 10px; color: var(--light); }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--paper-dark); } ::-webkit-scrollbar-thumb { background: var(--mid); }
  </style>
</head>
<body>

<header id="masthead">
  <div class="date-line" id="date-display"></div>
  <h1>Cyber<span>Paperboy</span>YTZ</h1>
  <div class="tagline">Global intelligence<br>daily dispatch</div>
</header>

<div id="ticker-bar">
  <span id="ticker-content">CyberPaperboyYTZ · 全球政经科技情报每日简报 · 点击「今日简报」获取最新内容 · 支持基于简报内容进行深度对话与分析</span>
</div>

<div id="app">
  <div id="control-bar">
    <button id="fetch-btn" onclick="fetchBrief()">📰 今日简报</button>
    <span id="status-text">就绪 · 点击获取今日情报</span>
    <button id="settings-toggle" onclick="toggleSettings()">⚙ 设置</button>
    <div id="model-toggle">
      模型：
      <select id="model-select">
        <option value="deepseek-chat">DeepSeek V3（快速）</option>
        <option value="deepseek-reasoner">DeepSeek R1（深度推理）</option>
      </select>
    </div>
  </div>

  <div id="settings-panel">
    <h3>设置</h3>
    <div class="sg">
      <label>DEEPSEEK API KEY</label>
      <input type="password" id="api-key-input" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
    </div>
    <div class="sg">
      <label>RSS 信源列表（名称 + URL）</label>
      <div id="rss-list"></div>
      <div class="btn-row">
        <button class="abtn" onclick="addRssRow()">+ 添加信源</button>
        <button class="abtn" onclick="saveSettings()">保存并关闭</button>
        <span id="save-status"></span>
      </div>
    </div>
  </div>

  <div id="brief-area"><div id="brief-content"></div></div>

  <div id="chat-area">
    <h2>▸ 深度对话 · 基于今日简报</h2>
    <div id="messages"></div>
    <div id="chat-input-row">
      <textarea id="chat-input" placeholder="基于今日简报，你想深入探讨什么？（Enter 发送，Shift+Enter 换行）" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendChat()">发送</button>
    </div>
  </div>
</div>

<footer>
  <span>CyberPaperboyYTZ</span>
  <span>Powered by DeepSeek API · RSS via allorigins.win</span>
</footer>

<script>
// ── DEFAULT RSS FEEDS（已验证稳定的免费源）──
const DEFAULT_FEEDS = [
  { label: 'Reuters World',      url: 'https://feeds.reuters.com/reuters/worldnews' },
  { label: 'BBC World News',     url: 'https://feeds.bbci.co.uk/news/world/rss.xml' },
  { label: 'Al Jazeera',         url: 'https://www.aljazeera.com/xml/rss/all.xml' },
  { label: 'The Guardian World', url: 'https://www.theguardian.com/world/rss' },
  { label: 'WSJ World News',     url: 'https://feeds.a.dj.com/rss/RSSWorldNews.xml' },
  { label: 'The Verge',          url: 'https://www.theverge.com/rss/index.xml' },
  { label: 'Ars Technica',       url: 'https://feeds.arstechnica.com/arstechnica/index' },
  { label: '36氪',               url: 'https://36kr.com/feed' },
  { label: 'Nikkei Asia',        url: 'https://asia.nikkei.com/rss/feed/nar' },
  { label: 'Hacker News Top',    url: 'https://hnrss.org/frontpage' },
];

// ── STATE ──
let briefContext = '';
let chatHistory  = [];
let settings     = {};

// ── INIT ──
window.onload = () => {
  document.getElementById('date-display').textContent =
    new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  loadSettings();
  // FIX-9: 无 API Key 时自动打开设置面板
  if (!settings.apiKey) {
    document.getElementById('settings-panel').classList.add('visible');
    document.getElementById('status-text').textContent = '⚠ 请先填入 API Key 并保存';
  }
};

// ── SETTINGS ──
function loadSettings() {
  try {
    const s = localStorage.getItem('cpb_settings');
    settings = s ? JSON.parse(s) : { apiKey: '', feeds: DEFAULT_FEEDS };
  } catch { settings = { apiKey: '', feeds: DEFAULT_FEEDS }; }
  document.getElementById('api-key-input').value = settings.apiKey || '';
  renderRssList();
}

function saveSettings() {
  settings.apiKey = document.getElementById('api-key-input').value.trim();
  settings.feeds  = collectRssRows();
  localStorage.setItem('cpb_settings', JSON.stringify(settings));
  const el = document.getElementById('save-status');
  el.textContent = '✓ 已保存';
  setTimeout(() => { el.textContent = ''; }, 2000);
  // FIX-8: 保存后自动关闭面板
  document.getElementById('settings-panel').classList.remove('visible');
  if (settings.apiKey)
    document.getElementById('status-text').textContent = '就绪 · 点击获取今日情报';
}

function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('visible');
}

// ── RSS ROW MANAGEMENT ──
function renderRssList() {
  const list  = document.getElementById('rss-list');
  list.innerHTML = '';
  const feeds = (settings.feeds && settings.feeds.length) ? settings.feeds : DEFAULT_FEEDS;
  feeds.forEach(f => list.appendChild(makeRssRow(f.label, f.url)));
}
function makeRssRow(label, url) {
  const row = document.createElement('div');
  row.className = 'rss-row';
  row.innerHTML =
    `<input class="rl" type="text" value="${esc(label)}" placeholder="信源名称">` +
    `<input class="ru" type="text" value="${esc(url)}"   placeholder="RSS URL">` +
    `<button class="del" onclick="this.closest('.rss-row').remove()">✕</button>`;
  return row;
}
function addRssRow() { document.getElementById('rss-list').appendChild(makeRssRow('','')); }
function collectRssRows() {
  return Array.from(document.querySelectorAll('.rss-row'))
    .map(r => ({ label: r.querySelector('.rl').value.trim(), url: r.querySelector('.ru').value.trim() }))
    .filter(f => f.url);
}

// ── RSS FETCH ──
// FIX-3: 修复 Atom <link href="..."/> 解析
// FIX-5: 添加 AbortController 超时 (9s)
async function fetchRss(feed) {
  const ctrl  = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 9000);
  try {
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(feed.url)}`;
    const res   = await fetch(proxy, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!res.ok) return [];
    const data = await res.json();
    if (!data.contents) return [];
    const xml   = new DOMParser().parseFromString(data.contents, 'text/xml');
    const items = Array.from(xml.querySelectorAll('item, entry')).slice(0, 6);
    return items.map(item => {
      const title   = item.querySelector('title')?.textContent?.trim() || '';
      const rawDesc = item.querySelector('description')?.textContent ||
                      item.querySelector('summary')?.textContent     ||
                      item.querySelector('content')?.textContent     || '';
      const desc = rawDesc.replace(/<[^>]+>/g,'').replace(/&amp;/g,'&')
                          .replace(/&lt;/g,'<').replace(/&gt;/g,'>').trim().slice(0,250);
      // FIX-3: handle Atom self-closing <link href="..."/> AND RSS <link>url</link>
      const linkEl = item.querySelector('link');
      const link   = linkEl ? (linkEl.getAttribute('href') || linkEl.textContent?.trim() || '') : '';
      return { title, desc, link, source: feed.label };
    }).filter(i => i.title);
  } catch { clearTimeout(timer); return []; }
}

// ── MAIN FETCH BRIEF ──
async function fetchBrief() {
  if (!settings.apiKey) {
    document.getElementById('settings-panel').classList.add('visible');
    document.getElementById('status-text').textContent = '⚠ 请先填入 API Key 并保存';
    return;
  }
  const btn    = document.getElementById('fetch-btn');
  const status = document.getElementById('status-text');
  btn.classList.add('loading');
  btn.textContent    = '⏳ 正在获取情报…';
  status.textContent = '正在抓取 RSS 信源…';

  const feeds    = (settings.feeds && settings.feeds.length) ? settings.feeds : DEFAULT_FEEDS;
  const results  = await Promise.allSettled(feeds.map(fetchRss));
  const allItems = results.flatMap(r => r.status === 'fulfilled' ? r.value : []);

  if (!allItems.length) {
    btn.classList.remove('loading'); btn.textContent = '📰 今日简报';
    status.textContent = '⚠ 所有 RSS 源抓取失败，请检查网络或更换信源';
    return;
  }
  status.textContent = `已获取 ${allItems.length} 条信息，正在生成简报…`;

  const newsText = allItems.map(i => `[${i.source}] ${i.title}${i.desc ? '\n'+i.desc : ''}`).join('\n\n');
  const today    = new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

  // FIX-4: system prompt 里不再使用 ... 占位符，改为明确说明
  const SYSTEM = `你是CyberPaperboyYTZ，一个服务于深度分析师的全球情报简报系统。今天是${today}。

将提供的RSS新闻数据整理成每日简报。严格只输出以下JSON，不包含任何其他文字、不使用markdown代码块：
{
  "headline": "今日最重要的一句话总结（20字以内）",
  "lead": {
    "title": "今日头条标题",
    "body": "头条详细分析150字左右，要有洞察，不要只是复述新闻"
  },
  "sections": [
    {
      "name": "宏观政策与政府决策",
      "emoji": "🏛️",
      "items": [
        {"title": "条目标题", "body": "50-80字分析", "source": "来源名称"},
        {"title": "条目标题", "body": "50-80字分析", "source": "来源名称"}
      ]
    },
    {
      "name": "科技与创新",
      "emoji": "💡",
      "items": [
        {"title": "条目标题", "body": "50-80字分析", "source": "来源名称"}
      ]
    },
    {
      "name": "财经与市场",
      "emoji": "📊",
      "items": [
        {"title": "条目标题", "body": "50-80字分析", "source": "来源名称"}
      ]
    },
    {
      "name": "企业动向",
      "emoji": "🏢",
      "items": [
        {"title": "条目标题", "body": "50-80字分析", "source": "来源名称"}
      ]
    },
    {
      "name": "地缘政治与关系网络",
      "emoji": "🌐",
      "items": [
        {"title": "条目标题", "body": "50-80字分析", "source": "来源名称"}
      ]
    }
  ],
  "analyst_note": "分析师按语：今日最值得关注的深层趋势，100字，要有真知灼见"
}
每个sections的items根据实际新闻填充3-6条；某分类若无相关新闻则items设为空数组。`;

  try {
    const model  = document.getElementById('model-select').value;
    const raw    = await callDeepSeek({ model, max_tokens: 3000,
      messages: [
        { role: 'system', content: SYSTEM },
        { role: 'user',   content: `今日原始新闻数据（共${allItems.length}条）：\n\n${newsText}` },
      ]
    });
    const brief  = extractJson(raw);
    briefContext = newsText;
    chatHistory  = [];
    renderBrief(brief);
    updateTicker(brief);
    btn.classList.remove('loading');
    btn.textContent    = '🔄 刷新简报';
    status.textContent = `✓ 简报已生成 · ${new Date().toLocaleTimeString('zh-CN')} · ${allItems.length} 条原始信息`;
  } catch (err) {
    btn.classList.remove('loading'); btn.textContent = '📰 今日简报';
    status.textContent = `⚠ ${err.message}`;
    console.error('[CPB]', err);
  }
}

// ── DEEPSEEK PROXY CALL ──
// FIX-1: 调用 /api/deepseek 而非直接调用 api.deepseek.com（CORS 修复）
async function callDeepSeek({ model, max_tokens, messages }) {
  const res  = await fetch('/api/deepseek', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model, max_tokens, messages, apiKey: settings.apiKey }),
  });
  const data = await res.json();
  if (data.error) {
    const msg = typeof data.error === 'string' ? data.error : (data.error.message || JSON.stringify(data.error));
    throw new Error(`DeepSeek 错误: ${msg}`);
  }
  return data.choices[0].message.content;
}

// FIX-2: 健壮的 JSON 提取
function extractJson(raw) {
  let clean = raw.trim()
    .replace(/^```(?:json)?\s*/i, '')
    .replace(/\s*```$/i, '')
    .trim();
  const s = clean.indexOf('{'), e = clean.lastIndexOf('}');
  if (s !== -1 && e !== -1) clean = clean.slice(s, e + 1);
  try { return JSON.parse(clean); }
  catch (err) { throw new Error(`AI 返回格式异常，请重试（${err.message}）`); }
}

// ── RENDER ──
function renderBrief(brief) {
  let html =
    `<div class="sec-head" style="margin-top:16px"><h2>今日要闻</h2><div class="rule"></div></div>` +
    `<div class="ngrid"><div class="lead">` +
    `<div class="lead-hed">${esc(brief.lead?.title||'')}</div>` +
    `<div class="lead-rule"></div>` +
    `<div class="lead-dek">${esc(brief.lead?.body||'')}</div>` +
    `</div></div>`;

  (brief.sections||[]).forEach(sec => {
    if (!sec.items?.length) return;
    html +=
      `<div class="sec-head"><h2>${sec.emoji||''} ${esc(sec.name)}</h2><div class="rule"></div><span class="cnt">${sec.items.length} 条</span></div>` +
      `<div class="ngrid">${sec.items.map(it =>
        `<div class="ni"><h3>${esc(it.title)}</h3><p>${esc(it.body)}</p><div class="src">${esc(it.source||'')}</div></div>`
      ).join('')}</div>`;
  });

  if (brief.analyst_note) {
    html +=
      `<div class="sec-head"><h2>✍ 分析师按语</h2><div class="rule"></div></div>` +
      `<div class="anote">${esc(brief.analyst_note)}</div>`;
  }

  document.getElementById('brief-content').innerHTML = html;
  document.getElementById('brief-area').classList.add('visible');
  document.getElementById('chat-area').classList.add('visible');
  document.getElementById('messages').innerHTML = '';
  addMsg('assistant', `简报已就绪。今日要点：${brief.headline||''}\n\n可就任何议题展开深度讨论。`);
}

function updateTicker(brief) {
  const titles = (brief.sections||[]).flatMap(s => (s.items||[]).map(i => i.title));
  document.getElementById('ticker-content').textContent =
    `CyberPaperboyYTZ · ${brief.headline||''} · ` + titles.join(' · ');
}

// ── CHAT ──
async function sendChat() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text || !settings.apiKey) return;
  addMsg('user', text);
  input.value = '';
  chatHistory.push({ role: 'user', content: text });
  const btn = document.getElementById('send-btn');
  btn.disabled = true; btn.textContent = '…';

  const SYS = `你是CyberPaperboyYTZ的深度分析助手。以下是今日全球情报简报的原始新闻数据：\n\n${briefContext}\n\n请基于上述信息进行深度、有洞察力的分析。回答要有观点，不要泛泛而谈。`;
  try {
    const reply = await callDeepSeek({
      model:      document.getElementById('model-select').value,
      max_tokens: 1500,
      messages:   [{ role:'system', content: SYS }, ...chatHistory],
    });
    chatHistory.push({ role:'assistant', content: reply });
    addMsg('assistant', reply);
  } catch (err) { addMsg('assistant', `⚠ ${err.message}`); }
  btn.disabled = false; btn.textContent = '发送';
}

function addMsg(role, text) {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML =
    `<div class="msg-role">${role==='user'?'YOU':'CPB'}</div>` +
    `<div class="msg-body">${esc(text).replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function handleKey(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

// ── UTILS ──
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
